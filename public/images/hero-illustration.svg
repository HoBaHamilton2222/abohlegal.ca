<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background subtle shape -->
  <rect x="40" y="60" width="320" height="380" rx="16" fill="#14304a" opacity="0.3"/>

  <!-- Courthouse silhouette -->
  <!-- Base -->
  <rect x="80" y="320" width="240" height="20" rx="2" fill="#C49A4A" opacity="0.8"/>
  <!-- Steps -->
  <rect x="100" y="340" width="200" height="8" rx="1" fill="#C49A4A" opacity="0.5"/>
  <rect x="120" y="348" width="160" height="8" rx="1" fill="#C49A4A" opacity="0.3"/>

  <!-- Pillars -->
  <rect x="110" y="200" width="24" height="120" rx="3" fill="white" opacity="0.7"/>
  <rect x="155" y="200" width="24" height="120" rx="3" fill="white" opacity="0.7"/>
  <rect x="221" y="200" width="24" height="120" rx="3" fill="white" opacity="0.7"/>
  <rect x="266" y="200" width="24" height="120" rx="3" fill="white" opacity="0.7"/>

  <!-- Pediment (triangle) -->
  <polygon points="80,200 200,130 320,200" fill="white" opacity="0.6"/>
  <polygon points="100,200 200,145 300,200" fill="#0C2233" opacity="0.8"/>

  <!-- Scales of justice -->
  <!-- Center post -->
  <rect x="196" y="155" width="8" height="30" fill="#C49A4A"/>
  <!-- Crossbar -->
  <rect x="150" y="152" width="100" height="4" rx="2" fill="#C49A4A"/>
  <!-- Left chain -->
  <line x1="160" y1="156" x2="160" y2="180" stroke="#C49A4A" stroke-width="2"/>
  <!-- Right chain -->
  <line x1="240" y1="156" x2="240" y2="180" stroke="#C49A4A" stroke-width="2"/>
  <!-- Left pan -->
  <path d="M140 180 Q150 195 160 180 Q170 195 180 180" fill="none" stroke="#C49A4A" stroke-width="2.5"/>
  <!-- Right pan -->
  <path d="M220 180 Q230 195 240 180 Q250 195 260 180" fill="none" stroke="#C49A4A" stroke-width="2.5"/>

  <!-- Decorative geometric elements -->
  <!-- Top left corner accent -->
  <rect x="40" y="60" width="60" height="4" rx="2" fill="#C49A4A" opacity="0.6"/>
  <rect x="40" y="60" width="4" height="60" rx="2" fill="#C49A4A" opacity="0.6"/>
  <!-- Bottom right corner accent -->
  <rect x="300" y="436" width="60" height="4" rx="2" fill="#C49A4A" opacity="0.6"/>
  <rect x="356" y="380" width="4" height="60" rx="2" fill="#C49A4A" opacity="0.6"/>

  <!-- Abstract dots pattern -->
  <circle cx="70" cy="400" r="3" fill="#C49A4A" opacity="0.3"/>
  <circle cx="85" cy="400" r="3" fill="#C49A4A" opacity="0.3"/>
  <circle cx="100" cy="400" r="3" fill="#C49A4A" opacity="0.3"/>
  <circle cx="70" cy="415" r="3" fill="#C49A4A" opacity="0.3"/>
  <circle cx="85" cy="415" r="3" fill="#C49A4A" opacity="0.3"/>
  <circle cx="70" cy="430" r="3" fill="#C49A4A" opacity="0.3"/>
</svg>
